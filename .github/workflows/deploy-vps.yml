name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps
  cancel-in-progress: true

env:
  APP_NAME: hongyuan
  APP_PORT: "3000"
  DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/var/www/hongyuan' }}
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
  ADMIN_USER: ${{ secrets.ADMIN_USER || secrets.RFQ_ADMIN_USER || 'admin' }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || secrets.RFQ_ADMIN_PASSWORD }}
  ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET || secrets.ADMIN_PASSWORD || secrets.RFQ_ADMIN_PASSWORD }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify sample images
        run: |
          test -f "dist/samples/Carbon Steel CNC Milled Parts.jpg"
          test -f "dist/samples/CNC Milled Aluminum Part with Clear Anodizing.jpg"
          test -f "dist/samples/CNC Turning Parts.jpg"
          test -f "dist/samples/Metal Bellows Expansion Joint.jpg"
          test -f "dist/samples/Precision cam plate with tight tolerance control.jpg"
          test -f "dist/samples/Precision Machined Flange Housing.jpg"
          test -f "dist/samples/TiN Coated Precision Support Block.jpg"
          test -f "dist/samples/Wire EDM Machined Gear with H7 Inner Diameter Tolerance.jpg"

      - name: Pack release
        run: |
          mkdir -p release
          cp -r dist package.json package-lock.json ecosystem.config.cjs release/
          tar -czf release.tar.gz -C release .

      - name: Configure SSH
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"

          if [ -z "$HOST" ]; then
            echo "VPS_HOST is empty. Set it to your VPS IP or domain, without http:// or https://."
            exit 1
          fi

          echo "VPS_HOST_CLEAN=$HOST" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=20 \
            "${{ secrets.VPS_USER }}@$HOST" \
            "echo SSH connection OK"

      - name: Upload release
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.VPS_USER }}@$VPS_HOST_CLEAN" "mkdir -p '$DEPLOY_PATH/releases'"
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts release.tar.gz "${{ secrets.VPS_USER }}@$VPS_HOST_CLEAN:$DEPLOY_PATH/release.tar.gz"

      - name: Activate release
        run: |
          ADMIN_USER_B64="$(printf '%s' "$ADMIN_USER" | base64 -w0)"
          ADMIN_PASSWORD_B64="$(printf '%s' "$ADMIN_PASSWORD" | base64 -w0)"
          ADMIN_SESSION_SECRET_B64="$(printf '%s' "$ADMIN_SESSION_SECRET" | base64 -w0)"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.VPS_USER }}@$VPS_HOST_CLEAN" "APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' DEPLOY_PATH='$DEPLOY_PATH' ADMIN_USER_B64='$ADMIN_USER_B64' ADMIN_PASSWORD_B64='$ADMIN_PASSWORD_B64' ADMIN_SESSION_SECRET_B64='$ADMIN_SESSION_SECRET_B64' bash -s" <<'EOF'
          export PATH="$HOME/.nvm/versions/node/v20/bin:$HOME/.nvm/versions/node/v22/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm use --silent 20 >/dev/null 2>&1 || nvm use --silent --lts >/dev/null 2>&1 || true
          fi

          set -euo pipefail

          APP_NAME="${APP_NAME:-hongyuan}"
          APP_PORT="${APP_PORT:-3000}"
          DEPLOY_PATH="${DEPLOY_PATH:-/var/www/hongyuan}"
          ADMIN_USER="$(printf '%s' "${ADMIN_USER_B64:-}" | base64 -d 2>/dev/null || printf 'admin')"
          ADMIN_PASSWORD="$(printf '%s' "${ADMIN_PASSWORD_B64:-}" | base64 -d 2>/dev/null || true)"
          ADMIN_SESSION_SECRET="$(printf '%s' "${ADMIN_SESSION_SECRET_B64:-}" | base64 -d 2>/dev/null || true)"
          RFQ_DATA_DIR="${RFQ_DATA_DIR:-$DEPLOY_PATH/shared/rfq}"
          BLOG_DATA_DIR="${BLOG_DATA_DIR:-$DEPLOY_PATH/shared/blog}"
          RELEASE_ID="$(date +%Y%m%d%H%M%S)"
          RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_ID"

          if ! command -v node >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
              echo "Node.js is not available. Installing Node.js 20 with apt..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -d -m 0755 /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list >/dev/null
              sudo apt-get update
              sudo apt-get install -y nodejs
            else
              echo "Node.js is not available in this SSH session. Install Node.js 20 on the VPS or deploy with a sudo-capable Debian/Ubuntu user."
              exit 1
            fi
          fi

          if ! command -v npm >/dev/null 2>&1; then
            echo "npm is not available in this SSH session. If you use nvm, make sure ~/.nvm/nvm.sh exists and Node 20 is installed."
            exit 1
          fi

          mkdir -p "$RELEASE_DIR" "$RFQ_DATA_DIR" "$BLOG_DATA_DIR"
          tar -xzf "$DEPLOY_PATH/release.tar.gz" -C "$RELEASE_DIR"
          rm -f "$DEPLOY_PATH/release.tar.gz"

          cd "$RELEASE_DIR"
          npm ci --omit=dev

          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "PM2 is not installed. Installing PM2..."
            sudo npm install -g pm2 || npm install -g pm2
          fi

          cd "$DEPLOY_PATH/current"
          pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
          PORT="$APP_PORT" NODE_ENV=production ADMIN_USER="$ADMIN_USER" ADMIN_PASSWORD="$ADMIN_PASSWORD" ADMIN_SESSION_SECRET="$ADMIN_SESSION_SECRET" RFQ_ADMIN_USER="$ADMIN_USER" RFQ_ADMIN_PASSWORD="$ADMIN_PASSWORD" RFQ_DATA_DIR="$RFQ_DATA_DIR" BLOG_DATA_DIR="$BLOG_DATA_DIR" pm2 start ecosystem.config.cjs --env production --update-env
          pm2 flush "$APP_NAME" >/dev/null 2>&1 || true
          pm2 save

          pm2 describe "$APP_NAME"

          find "$DEPLOY_PATH/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          EOF
